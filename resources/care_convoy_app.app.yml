resources:
  apps:
    care_convoy_app:
      name: ${var.app_name}
      description: ${var.app_description}
      compute_size: MEDIUM
      source_code_path: ..
      permissions:
        - group_name: users
          level: CAN_USE
        - user_name: zliang29@asu.edu
          level: CAN_USE
        - user_name: ${var.workspace_user_name}
          level: CAN_MANAGE
      resources:
        - name: shortlist_store
          postgres:
            branch: ${var.postgres_branch}
            database: ${var.postgres_database}
            permission: CAN_CONNECT_AND_CREATE
        - name: mission_warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: explanation_model
          serving_endpoint:
            name: ${var.primary_llm_endpoint}
            permission: CAN_QUERY
